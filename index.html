<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>WM2026 #1 Checker</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f0f0f0;
  }

  .container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
  }

  h2 {
    font-size: 28px;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }

  button {
    background: #4CAF50;
    color: white;
    border: none;
  }

  button:hover {
    background: #45a049;
  }

  #ergebnis {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  
<h2>WM2026 #1 Checker</h2>

<!-- Dropdown -->
<label>Station wählen:</label>
<select id="station">
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
  <option value="E">E</option>
  <option value="F">F</option>
  <option value="G">G</option>
  <option value="H">H</option>
</select>

<br><br>

<!-- Eingabe -->
<input type="text" id="wort" placeholder="Wort eingeben">
<button onclick="check()">Prüfen</button>

<p id="ergebnis"></p>

<script>
function check() {
  let wort = document.getElementById("wort").value
    .toLowerCase()
    .trim();

  let station = document.getElementById("station").value;

  //  Lösungen pro Station
  let loesungen = {
    "A": { "schild": 5,
          "sponsor": 5,
          "logo": 5,
          "hard rock": 5,
          "hard rock cafe": 5,
            },
    "B": { "werbung": 8,
            "plakat": 8,
            "kia": 8,
            "billboard": 8,
           },
    "C": { "rollstuhl": 2,
            "rollstühle": 2,
            "leute": 2,
            "fans": 2,
            "menschen": 2,
            "personen": 2,
            "person": 2,
            "rollstuhlfahrer": 2,
           },
    "D": { "fahne": 7,
            "nationalfahe": 7,
            "usa": 7, 
            "amerika": 7,
            "mast": 7,
            "fahnenmast": 7,
           },
    "E": { "bier": 3,
            "corona": 3,
            "werbung": 3,
            "becher": 3,
            "billboard": 3,
            "plakat": 3,
           },
    "F": { "kasten": 9,
            "tor": 9,
            "rahmen": 9,
            "netz": 9,
            "tore": 9,
           },
    "G": { "geländer": 1,
            "gelaender": 1,
            "metal": 1,
            "begrenzung": 1,
           },
    "H": { "billboard": 2,
           "anzeige": 2,
            "anzeige tafel": 2,
            "tafel": 2,
            "scoreboard": 2,
           }
  };

  let output = document.getElementById("ergebnis");
  
  if (station in loesungen && wort in loesungen[station]) {
    document.getElementById("ergebnis").innerText =
      "Station " + station + ": Richtig! Dein Wert ist: " + loesungen[station][wort];
      output.style.color = "#0da815";
  } else {
    document.getElementById("ergebnis").innerText = "Nicht richtig!";
    output.style.color = "#d11919";
  }
}
document.getElementById("wort").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    check();
  }
});

  
</script>

</body>
</html>
