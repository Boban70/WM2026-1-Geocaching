<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>WM2026 #1 Checker</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f0f0f0;
  }

  .container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
  }

  h2 {
    font-size: 28px;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }

  button {
    background: #4CAF50;
    color: white;
    border: none;
  }

  button:hover {
    background: #45a049;
  }

  #ergebnis {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  
<h2>WM2026 #1 Checker</h2>

<!-- Dropdown -->
<label>Station wählen:</label>
<select id="station">
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
  <option value="E">E</option>
  <option value="F">F</option>
  <option value="G">G</option>
  <option value="H">H</option>
</select>

<br><br>

<!-- Eingabe -->
<input type="text" id="wort" placeholder="Wort eingeben">
<button onclick="check()">Prüfen</button>

<p id="ergebnis"></p>

<script>
function check() {
  let wort = document.getElementById("wort").value
    .toLowerCase()
    .trim();

  let station = document.getElementById("station").value;

  //  Lösungen pro Station
  let loesungen = {
    "A": { "schild": 2,
          "sponsor": 2,
          "logo": 2,
          "hard rock": 2,
          "hard rock cafe": 2,
            },
    "B": { "werbung": 7,
            "plakat": 7,
            "kia": 7,
            "billboard": 7,
           },
    "C": { "rollstuhl": 3,
            "rollstühle": 3,
            "leute": 3,
            "fans": 3,
            "menschen": 3,
            "personen": 3,
            "person": 3,
            "rollstuhlfahrer": 3,
           },
    "D": { "fahne": 1,
            "nationalfahe": 1,
            "usa": 1, 
            "amerika": 1,
            "mast": 1,
            "fahnenmast": 1,
           },
    "E": { "bier": 4,
            "corona": 4,
            "werbung": 4,
            "becher": 4,
            "billboard": 4,
            "plakat": 4,
           },
    "F": { "kasten": 2,
            "tor": 2,
            "rahmen": 2,
            "netz": 2,
            "tore": 2,
           },
    "G": { "geländer": 0,
            "gelaender": 0,
            "metal": 0,
            "begrenzung": 0,
           },
    "H": { "billboard": 3,
           "anzeige": 3,
            "anzeige tafel": 3,
            "tafel": 3,
            "scoreboard": 3,
           }
  };

  if (station in loesungen && wort in loesungen[station]) {
    document.getElementById("ergebnis").innerText =
      "Station " + station + ": Richtig! Dein Wert ist: " + loesungen[station][wort];
      output.style.color = "green";
  } else {
    document.getElementById("ergebnis").innerText = "Nicht richtig!";
    output.style.color = "red";
  }
}
</script>

</body>
</html>
