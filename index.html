<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Geocache Checker</title>
</head>
<body>

<h2>Gib dein Lösungswort ein</h2>

<input type="text" id="wort" placeholder="Wort eingeben">
<button onclick="check()">Prüfen</button>

<p id="ergebnis"></p>

<script>
function check() {
  let wort = document.getElementById("wort").value.toLowerCase();

  if (wort === "hut") {
    document.getElementById("ergebnis").innerText = "Richtig! Dein Wert ist: 5";
  } 
  else if (wort === "baum") {
    document.getElementById("ergebnis").innerText = "Richtig! Dein Wert ist: 12";
  }
  else {
    document.getElementById("ergebnis").innerText = "Nicht richtig!";
  }
}
</script>

</body>
</html>
